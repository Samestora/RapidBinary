name: Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_name: rbserver_linux_amd64.tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            archive_name: rbserver_windows_amd64.zip
          - os: macos-latest
            goos: darwin
            goarch: arm64
            archive_name: rbserver_macos_arm64.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        shell: bash
        run: |
          # Define binary name based on OS
          BINARY_NAME="rbserver"
          if [ "${{ matrix.goos }}" = "windows" ]; then BINARY_NAME="rbserver.exe"; fi

          go build -ldflags="-s -w" -o "$BINARY_NAME" ./cmd/rbserver

          # Compress based on file extension
          if [[ "${{ matrix.archive_name }}" == *.zip ]]; then
            7z a "${{ matrix.archive_name }}" "$BINARY_NAME"
          else
            tar -czvf "${{ matrix.archive_name }}" "$BINARY_NAME"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the zipped binaries from the build job
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      # Extract the relevant version from CHANGELOG.md
      - name: Get Changelog Entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ github.ref_name }}
          path: ./CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog_reader.outputs.log_entry }}
          files: ./dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
