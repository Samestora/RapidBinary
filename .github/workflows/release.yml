name: Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            archive_ext: zip
          - os: macos-latest
            goos: darwin
            goarch: arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        shell: bash
        run: |
          # Define binary name based on OS
          DIST_NAME="rapidbinary_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$DIST_NAME"

          for APP in rbserver rbhash; do
            BINARY_NAME="$APP"
            if [ "${{ matrix.goos }}" = "windows" ]; then BINARY_NAME="$APP.exe"; fi

            echo "Building $APP..."
            go build -ldflags="-s -w" -o "$DIST_NAME/$BINARY_NAME" ./cmd/$APP
          done

          ARCHIVE_FILE="${DIST_NAME}.${{ matrix.archive_ext }}"

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            7z a "$ARCHIVE_FILE" "./$DIST_NAME/*"
          else
            tar -czvf "$ARCHIVE_FILE" -C "$DIST_NAME" .
          fi

          echo "archive_path=$ARCHIVE_FILE" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.archive_path }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the zipped binaries from the build job
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      # Extract the relevant version from CHANGELOG.md
      - name: Get Changelog Entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ github.ref_name }}
          path: ./CHANGELOG.md

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog_reader.outputs.changes }}
          artifacts: ./dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
