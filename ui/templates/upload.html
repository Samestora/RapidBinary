<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rapid Binary Server : Upload</title>
        <style>
            :root {
                --primary: #007bff;
                --bg: #f8f9fa;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: var(--bg);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .card {
                background: white;
                padding: 2rem;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                width: 100%;
                max-width: 400px;
                text-align: center;
            }
            h2 {
                color: #333;
                margin-bottom: 1.5rem;
            }
            .upload-zone {
                border: 2px dashed #cbd5e0;
                padding: 2rem;
                border-radius: 8px;
                transition: 0.3s;
                cursor: pointer;
                margin-bottom: 1rem;
            }
            .upload-zone:hover {
                border-color: var(--primary);
                background: #f0f7ff;
            }
            input[type="file"] {
                margin-bottom: 1rem;
                width: 100%;
            }
            button {
                background: var(--primary);
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 6px;
                font-weight: 600;
                cursor: pointer;
                width: 100%;
                font-size: 1rem;
            }
            button:hover {
                background: #0056b3;
            }
            .footer-links {
                margin-top: 1.5rem;
                font-size: 0.9rem;
            }
            a {
                color: var(--primary);
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>File Upload</h2>
            <form action="/" method="post" enctype="multipart/form-data">
                <div
                    class="upload-zone"
                    onclick="document.getElementById('fileInput').click()"
                >
                    <p>Click to select or drag file here</p>
                    <input type="file" name="file" id="fileInput" required />
                </div>
                <button type="submit">Upload File</button>
            </form>
            <div class="footer-links">
                <a href="/">Browse Files</a>
            </div>
        </div>
    </body>
</html>
